<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>慈善项目 - 可编辑版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      display: flex; 
      height: 100vh; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
    }
    #editor-panel { 
      width: 50%; 
      padding: 20px; 
      border-right: 2px solid #e1e4e8;
      background: #f6f8fa;
      display: flex;
      flex-direction: column;
    }
    #preview-panel { 
      width: 50%; 
      padding: 20px;
      overflow: auto;
      background: white;
    }
    h3 { margin-bottom: 12px; color: #24292f; font-size: 16px; }
    textarea { 
      flex: 1;
      width: 100%; 
      font-family: "SF Mono", Monaco, monospace;
      font-size: 13px;
      padding: 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      resize: none;
      line-height: 1.5;
    }
    .btn-group {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      background: #2da44e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover { background: #2c974b; }
    button.secondary {
      background: #0969da;
    }
    button.secondary:hover {
      background: #0550ae;
    }
    #preview {
      border: 1px solid #d0d7de;
      border-radius: 6px;
      min-height: 200px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="editor-panel">
    <h3>📝 编辑 HTML 代码</h3>
    <textarea id="code-input" placeholder="在此粘贴 HTML 代码..."></textarea>
    <div class="btn-group">
      <button onclick="updatePreview()">🔄 更新预览</button>
      <button class="secondary" onclick="downloadHTML()">⬇️ 下载分享版</button>
    </div>
  </div>
  
  <div id="preview-panel">
    <h3>👁️ 实时预览</h3>
    <div id="preview"></div>
  </div>

  <script>
    const defaultHTML = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>公益项目</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; line-height: 1.6; color: #333; }
    h1 { color: #2da44e; margin-bottom: 10px; }
    .subtitle { color: #666; margin-bottom: 30px; }
    .card { background: #f6f8fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .btn { display: inline-block; padding: 10px 20px; background: #2da44e; color: white; text-decoration: none; border-radius: 6px; }
    .btn:hover { background: #2c974b; }
  </style>
</head>
<body>
  <h1>乡村儿童教育计划</h1>
  <p class="subtitle">为偏远地区儿童提供数字化教育资源</p>
  
  <div class="card">
    <h3>项目目标</h3>
    <p>筹集 50 万元，为 10 所乡村小学建设多媒体教室，配备电脑、投影仪和网络设备。</p>
  </div>
  
  <div class="card">
    <h3>当前进度</h3>
    <p>已筹集：¥128,000 | 完成度：25.6%</p>
    <div style="background: #e1e4e8; height: 20px; border-radius: 10px; margin-top: 10px;">
      <div style="background: #2da44e; width: 25.6%; height: 100%; border-radius: 10px;"></div>
    </div>
  </div>
  
  <a href="#" class="btn">立即捐赠</a>
  <a href="#" class="btn" style="background: #0969da; margin-left: 10px;">了解详情</a>
</body>
</html>`;
    
    document.getElementById('code-input').value = defaultHTML;
    
    function updatePreview() {
      const code = document.getElementById('code-input').value;
      document.getElementById('preview').innerHTML = code;
    }
    
    function downloadHTML() {
      const code = document.getElementById('code-input').value;
      const blob = new Blob([code], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'charity-project-share.html';
      a.click();
      URL.revokeObjectURL(url);
    }
    
    updatePreview();
  </script>
</body>
</html>
